# codex-openimage pack manifest
# Generated by `auto-pack` mode. Edit, then approve to spawn codex.
#
# Lifecycle:
#   1. `scan-image-slots.sh` discovers slots → orchestrator drafts this manifest.
#   2. User reviews + approves once (single confirmation for the whole batch).
#   3. Orchestrator generates the asset listed as `reference_image` first.
#   4. Every remaining asset is spawned with that hero passed as input_image
#      (style anchor). Up to 3-4 spawns run in parallel.
#   5. Postprocess fires per asset on completion; sidecars written next to each PNG.

pack:
  name: "fintech-landing-v1"             # short, slug-safe; used in logs + sidecars
  style_anchor: |
    Flat geometric illustration. Bold deliberate shapes, generous negative space,
    no gradients, no glassmorphism. Slight grain texture. Friendly + competent tone.
    See references/style-anchors.md for the full descriptor library.
  palette: "sage #7A9B76, sand #E8DCC4, clay #B8654F, ink #1A1F2E"  # inherited from project-detection, or set explicit
  output_dir: "public/images"            # framework-detected (Next/Nuxt/Astro/Vite → public/images; SvelteKit → static/images)
  reference_image: "public/images/hero-desktop.png"  # generated first; reused as input_image for every other asset

assets:
  # ---- HERO (responsive, text overlay) -------------------------------------
  - id: hero
    intent: hero
    responsive: true                     # generates mobile/tablet/desktop set (3 spawns)
    text_overlay: true                   # composes for safe zone
    safe_zone:
      mobile: "center-horizontal-band"   # text sits in middle 60% — keep that band visually quiet
      tablet: "left-half"
      desktop: "left-third"              # headline left, focal subject right
    prompt: |
      Subject: a person at a kitchen table reviewing a household budget on a tablet.
      Scene: warm morning light through a window, plants on the sill, coffee cup.
      Composition: subject offset right; left third reserved for headline copy.
      Avoid: photoreal faces, brand logos, glassmorphism, neon gradients.
    paths:
      mobile:  public/images/hero-mobile.png
      tablet:  public/images/hero-tablet.png
      desktop: public/images/hero-desktop.png

  # ---- OG CARD (single, fixed surface) -------------------------------------
  - id: og
    intent: og
    responsive: false                    # OG sizes are canonical, not responsive
    prompt: |
      Subject: distilled hero motif — tablet + plant + coffee, no figure.
      Composition: centered, generous margins, large negative space.
      Brand line "Track every dollar" should fit in the lower third (not rendered in the image).
    paths:
      default: public/og.png

  # ---- FEATURE CARDS (1024², n=1 each) -------------------------------------
  - id: feat-budgets
    intent: feature-card
    responsive: false
    n: 1
    prompt: |
      Subject: a tidy desk drawer with envelopes labeled "rent", "food", "fun".
      Scene: top-down view, soft daylight, paper textures.
      Style: same palette + flat illustration vocabulary as hero.
    paths:
      default: public/images/feat-budgets.png

  - id: feat-goals
    intent: feature-card
    responsive: false
    n: 1
    prompt: |
      Subject: a hand placing a coin in a labeled jar marked "vacation".
      Scene: warm shelf, two other jars in the blurred background.
    paths:
      default: public/images/feat-goals.png

  - id: feat-cashflow
    intent: feature-card
    responsive: false
    n: 1
    prompt: |
      Subject: simple river-like ribbon flowing from a wallet to small icons (bills, savings, treats).
      Scene: abstract editorial composition, generous breathing room.
    paths:
      default: public/images/feat-cashflow.png

# ---- Cost tracking ---------------------------------------------------------
# Orchestrator fills this in before asking for batch approval.
# Computed from references/intent-presets.md cost table × n × responsive-multiplier.
cost_estimate_usd: 0.00
